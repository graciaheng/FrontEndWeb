<h2>Presidents of Ireland</h2>

<ul>
    <li *ngFor="let president of presidents"> <!-- import CommonModule to use ngfor -->
        {{ president }} <!--display name od presidents-->
    </li>
</ul>

<ol>
    @for(pres of presidents; track pres){
        <li>{{ pres }}</li> <!-- display name of presidents-->
    }
</ol>

<h2>Presidents of Ireland Terms</h2>

<ul>
    <!--can use any name eg president/pres-->
    @for(president of presidents2; track president){
        <li>{{ president.name }}, {{president.term}}</li> <!-- display terms of presidents-->
    }
</ul>
